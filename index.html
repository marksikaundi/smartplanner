<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Planner</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Bootstrap Datepicker (calendar picker) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/css/bootstrap-datepicker.min.css"
    />
  </head>
  <body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
      <div class="container-fluid">
        <span class="navbar-brand fw-semibold">Smart Planner</span>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <input
            type="date"
            id="datePicker"
            class="form-control form-control-sm bg-dark text-light border-secondary"
          />
          <button id="todayBtn" class="btn btn-outline-light btn-sm">Today</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4">
        <section class="col-lg-8">
          <div class="card bg-black border-secondary shadow-sm h-100">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
              <div>
                <h5 class="mb-0" id="selectedDateHeading">Today</h5>
                <small class="text-secondary" id="selectedDateSubheading"></small>
              </div>
              <span class="badge bg-primary" id="taskCountBadge">0 tasks</span>
            </div>
            <div class="card-body">
              <form id="taskForm" class="row g-2 align-items-end mb-3">
                <div class="col-md-5">
                  <label for="taskTitle" class="form-label small text-uppercase text-secondary mb-1"
                    >Task</label
                  >
                  <input
                    type="text"
                    id="taskTitle"
                    class="form-control form-control-sm bg-dark text-light border-secondary"
                    placeholder="What do you need to do?"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label for="taskTime" class="form-label small text-uppercase text-secondary mb-1"
                    >Time</label
                  >
                  <input
                    type="time"
                    id="taskTime"
                    class="form-control form-control-sm bg-dark text-light border-secondary"
                  />
                </div>
                <div class="col-md-2">
                  <label for="taskCategory" class="form-label small text-uppercase text-secondary mb-1"
                    >Category</label
                  >
                  <select
                    id="taskCategory"
                    class="form-select form-select-sm bg-dark text-light border-secondary"
                  >
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Health">Health</option>
                    <option value="Study">Study</option>
                  </select>
                </div>
                <div class="col-md-2 text-end">
                  <button type="submit" class="btn btn-primary btn-sm w-100">Add</button>
                </div>
              </form>

              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="btn-group btn-group-sm" role="group" aria-label="Filter tasks">
                  <button type="button" class="btn btn-outline-secondary active" data-filter="all">
                    All
                  </button>
                  <button type="button" class="btn btn-outline-secondary" data-filter="pending">
                    Pending
                  </button>
                  <button type="button" class="btn btn-outline-secondary" data-filter="done">
                    Done
                  </button>
                </div>
                <button id="clearDayBtn" class="btn btn-outline-danger btn-sm">
                  Clear Day
                </button>
              </div>

              <ul class="list-group list-group-flush" id="taskList"></ul>
              <p class="text-secondary small mt-3 mb-0" id="emptyState">
                No tasks yet for this day. Add your first task above.
              </p>
            </div>
          </div>
        </section>

        <aside class="col-lg-4">
          <div class="card bg-black border-secondary shadow-sm mb-4">
            <div class="card-header border-secondary">
              <h6 class="mb-0">Calendar</h6>
            </div>
            <div class="card-body">
              <div class="mb-2">
                <label for="sidebarDatePicker" class="form-label small text-uppercase text-secondary mb-1"
                  >Pick a day</label
                >
                <div class="input-group input-group-sm">
                  <input
                    type="text"
                    id="sidebarDatePicker"
                    class="form-control bg-dark text-light border-secondary"
                    autocomplete="off"
                  />
                  <button
                    id="sidebarTodayBtn"
                    class="btn btn-outline-light"
                    type="button"
                    aria-label="Jump to today"
                    title="Today"
                  >
                    Today
                  </button>
                </div>
              </div>

              <div class="small text-secondary">
                Selected: <span id="sidebarSelectedDateLabel">—</span>
              </div>
            </div>
          </div>

          <div class="card bg-black border-secondary shadow-sm">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
              <h6 class="mb-0">Focus</h6>
              <small class="text-secondary" id="focusInfo"></small>
            </div>
            <div class="card-body">
              <p class="small text-secondary mb-2">
                Pick one priority task for today so you always know what matters most.
              </p>
              <div id="focusTaskContainer" class="border border-secondary rounded p-2 small">
                <span id="focusTaskText" class="text-secondary">No focus task yet.</span>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <!-- Bootstrap JS (for components, not required for core logic) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- Required for bootstrap-datepicker -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/js/bootstrap-datepicker.min.js"></script>
    <script src="/js/app.js"></script>
  </body>
  </html>
