<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Planner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/css/bootstrap-datepicker.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="dashboard-page">
    <div class="dashboard-app">
      <aside class="dashboard-sidebar">
        <div class="sidebar-top">
          <div class="logo-dot">SP</div>
          <a href="index.html" class="landing-link">Back</a>
        </div>

        <div class="sidebar-search-wrap">
          <input type="text" class="form-control sidebar-search" placeholder="Search..." />
        </div>

        <nav class="sidebar-nav">
          <a id="todayBtn" class="sidebar-item active" data-view="today" href="planner.html?view=today">
            <i class="fa-solid fa-calendar-day"></i>
            <span>Today</span>
          </a>
          <a class="sidebar-item" data-view="inbox" href="planner.html?view=inbox">
            <i class="fa-solid fa-inbox"></i>
            <span>Inbox</span>
          </a>
          <a class="sidebar-item" data-view="upcoming" href="planner.html?view=upcoming">
            <i class="fa-regular fa-clock"></i>
            <span>Upcoming</span>
          </a>
          <a class="sidebar-item" data-view="meetings" href="planner.html?view=meetings">
            <i class="fa-solid fa-users"></i>
            <span>Meetings</span>
          </a>
          <a class="sidebar-item" data-view="design" href="planner.html?view=design">
            <i class="fa-solid fa-pen-ruler"></i>
            <span>Design</span>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <div class="small text-white-50 mb-2">Selected Date</div>
          <div class="sidebar-date-chip">
            <span id="sidebarSelectedDateLabel">—</span>
          </div>
        </div>
      </aside>

      <main class="dashboard-main">
        <div class="dashboard-header">
          <div>
            <h4 class="mb-1" id="selectedDateHeading">My Tasks Dashboard</h4>
            <small id="selectedDateSubheading" class="text-muted">Today</small>
          </div>
          <div class="dashboard-actions">
            <input type="date" id="datePicker" class="d-none" />
            <input type="text" id="sidebarDatePicker" class="form-control form-control-sm date-input" />
            <button id="sidebarTodayBtn" class="btn btn-light btn-sm" type="button">Today</button>
            <span class="badge text-bg-primary" id="taskCountBadge">0 tasks</span>
          </div>
        </div>

        <section class="stats-grid">
          <article class="stat-card">
            <div class="stat-number" id="totalTasksStat">0</div>
            <div class="stat-label">Total Tasks</div>
          </article>
          <article class="stat-card">
            <div class="stat-number" id="completedTasksStat">0</div>
            <div class="stat-label">Tasks Completed</div>
          </article>
          <article class="stat-card">
            <div class="stat-number" id="progressStat">0%</div>
            <div class="stat-label">Task Progress</div>
          </article>
        </section>

        <section class="projects-panel">
          <div class="projects-head">
            <h5 class="mb-0">My Projects</h5>
            <button id="clearDayBtn" class="btn btn-outline-secondary btn-sm" type="button">Clear Day</button>
          </div>

          <form id="taskForm" class="task-form">
            <input type="text" id="taskTitle" class="form-control" placeholder="Add Task" required />
            <input type="time" id="taskTime" class="form-control" />
            <select id="taskCategory" class="form-select">
              <option value="Meetings">Meetings</option>
              <option value="Design">Design</option>
              <option value="Planning">Planning</option>
              <option value="Personal">Personal</option>
            </select>
            <button type="submit" class="btn btn-danger">Add Task</button>
          </form>

          <div class="d-flex justify-content-between align-items-center mt-3 mb-2">
            <div class="btn-group btn-group-sm" role="group" aria-label="Filter tasks">
              <button type="button" class="btn btn-outline-secondary active" data-filter="all">All</button>
              <button type="button" class="btn btn-outline-secondary" data-filter="pending">Pending</button>
              <button type="button" class="btn btn-outline-secondary" data-filter="done">Done</button>
            </div>
            <small id="focusInfo" class="text-muted"></small>
          </div>

          <ul class="list-group list-group-flush project-task-list" id="taskList"></ul>
          <p class="text-muted small mt-3 mb-0" id="emptyState">No tasks yet for this day. Add your first task above.</p>
        </section>

        <section class="focus-inline mt-3">
          <div id="focusTaskContainer" class="focus-inline-box">
            <span class="text-muted">Focus task: </span>
            <span id="focusTaskText" class="text-dark">No focus task yet.</span>
          </div>
        </section>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/js/bootstrap-datepicker.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
